services:
  # --- API (PHP-FPM) ---
  api:
    build:
      context: ./api
      dockerfile: docker/Dockerfile
    volumes:
      - ./api:/var/www/api
    environment:
      - APP_ENV=production
      - DB_HOST=mysql
      - DB_DATABASE=laravel
      - DB_USERNAME=laravel
      - DB_PASSWORD=secret
      - MONGODB_URI=mongodb://mongodb:27017
      - REDIS_HOST=redis
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - tarefador-net

  # --- API (Nginx) ---
  nginx:
    image: nginx:alpine
    ports:
      - "8000:8000"
    volumes:
      - ./api:/var/www/api
      - ./api/docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
    networks:
      - tarefador-net

  # --- SPA (built + served by Nginx) ---
  spa:
    build:
      context: ./spa
      dockerfile: docker/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - nginx
    networks:
      - tarefador-net

  # --- MySQL ---
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - tarefador-net

  # --- MongoDB ---
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: laravel
    volumes:
      - mongodb-data:/data/db
    networks:
      - tarefador-net

  # --- Redis ---
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - tarefador-net

  # --- Mailpit ---
  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - tarefador-net

volumes:
  mysql-data:
  mongodb-data:
  redis-data:

networks:
  tarefador-net:
    driver: bridge
